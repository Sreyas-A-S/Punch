name: Deploy to Secondary Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🚀 FTP Deploy to Staging
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.OTHER_FTP_SERVER }}
          username: ${{ secrets.OTHER_FTP_USER }}
          password: ${{ secrets.OTHER_FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./
          exclude: |
            vendor/**
            .env
            public/**
            storage/**
            .git/**
